<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Superior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1f14;
    --fg: #e8e4db;
    --accent: #e8ff41;
    --dim: rgba(232,228,219,0.35);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 48px 56px;
    cursor: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .cur {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: exclusion;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 96px;
    opacity: 0;
    animation: appear 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1.5px;
    color: var(--fg);
    text-decoration: none;
    cursor: none;
  }

  .wordmark em { font-style: normal; color: var(--accent); }

  .back-link {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    cursor: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.2s;
    padding-top: 6px;
  }

  .back-link::before {
    content: '';
    width: 28px; height: 1px;
    background: currentColor;
    transition: width 0.3s;
  }

  .back-link:hover { color: var(--fg); }
  .back-link:hover::before { width: 44px; }

  .page-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    opacity: 0;
    animation: appear 0.9s 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: -3px;
    line-height: 0.95;
    margin-bottom: 80px;
    opacity: 0;
    animation: appear 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  /* EMPTY STATE */
  .empty-state {
    border: 1px solid rgba(232,228,219,0.07);
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    animation: appear 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    max-width: 600px;
  }

  .empty-num {
    font-family: 'Syne', sans-serif;
    font-size: 80px;
    font-weight: 800;
    color: rgba(232,228,219,0.05);
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: -8px;
  }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: rgba(232,228,219,0.3);
  }

  .empty-sub {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(232,228,219,0.18);
    line-height: 1.8;
    max-width: 360px;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    body { padding: 32px 28px; }
    .empty-state { padding: 48px 32px; }
  }
</style>
</head>
<body>

<div class="cur" id="cur"></div>

<header>
  <a href="../index.html" class="wordmark">Super<em>ior</em></a>
  <a href="../index.html" class="back-link">Back to home</a>
</header>

<div class="page-label">Work</div>
<h1>Portfolio</h1>

<div class="empty-state">
  <div class="empty-num">—</div>
  <div class="empty-title">Nothing here yet.</div>
  <div class="empty-sub">Projects will appear here as we complete them. Check back soon, or get in touch to be among the first clients.</div>
</div>

<script>
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
