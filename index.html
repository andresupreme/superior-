<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1f14;
    --fg: #e8e4db;
    --accent: #e8ff41;
    --dim: rgba(232,228,219,0.35);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100vh;
    padding: 48px 56px;
    cursor: none;
    overflow: hidden;
    position: relative;
  }

  /* GREEN BACKGROUND GLOW - blurry, crispy light green */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* main large soft green orb, center-left */
  .bg-glow::before {
    content: '';
    position: absolute;
    width: 900px; height: 700px;
    left: -200px; top: -100px;
    background: radial-gradient(ellipse at 40% 40%,
      rgba(80, 200, 80, 0.18) 0%,
      rgba(60, 180, 60, 0.10) 35%,
      rgba(30, 120, 50, 0.04) 65%,
      transparent 100%
    );
    filter: blur(55px);
  }

  /* sharp crispy bright accent — smaller, intense */
  .bg-glow::after {
    content: '';
    position: absolute;
    width: 320px; height: 320px;
    left: 15%; top: 20%;
    background: radial-gradient(circle,
      rgba(160, 255, 120, 0.22) 0%,
      rgba(100, 230, 80, 0.13) 30%,
      rgba(60, 180, 60, 0.05) 60%,
      transparent 100%
    );
    filter: blur(14px);
  }

  /* extra subtle warm-green secondary orb, bottom right */
  .bg-glow-2 {
    position: fixed;
    width: 600px; height: 500px;
    right: -100px; bottom: -100px;
    background: radial-gradient(ellipse,
      rgba(50, 160, 70, 0.10) 0%,
      rgba(30, 100, 50, 0.05) 50%,
      transparent 100%
    );
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }

  /* grain overlay */
  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 998;
  }

  /* cursor */
  .cur {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: exclusion;
  }

  /* ALL CONTENT sits above bg */
  header, .center, footer { position: relative; z-index: 1; }

  /* TOP ROW */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 8vw, 96px);
    letter-spacing: -4px;
    line-height: 0.9;
    color: var(--fg);
    opacity: 0;
    animation: appear 1s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .wordmark em { font-style: normal; color: var(--accent); }

  /* RIGHT NAV — big links */
  .right-nav {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    opacity: 0;
    animation: appear 1s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .nav-link {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 3vw, 38px);
    letter-spacing: -1px;
    color: var(--fg);
    text-decoration: none;
    cursor: none;
    line-height: 1.15;
    transition: color 0.2s;
    display: block;
  }
  .nav-link:hover { color: var(--accent); }

  .nav-contact { text-align: right; }

  .nav-email {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--dim);
    margin-top: 2px;
  }

  /* CENTER */
  .center {
    position: absolute;
    top: 50%;
    left: 56px;
    transform: translateY(-50%);
    opacity: 0;
    animation: appearCenter 1s 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .descriptor {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }

  .service {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 2.5vw, 28px);
    letter-spacing: -0.5px;
    color: var(--fg);
    line-height: 1.3;
  }

  /* BOTTOM ROW */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: appear 1s 0.75s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .location {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    line-height: 1.8;
  }
  .location strong {
    display: block;
    font-size: 13px;
    color: var(--fg);
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  /* DIVIDER LINE */
  .vline {
    position: fixed;
    top: 0; bottom: 0;
    right: 30%;
    width: 1px;
    background: rgba(232,228,219,0.04);
    pointer-events: none;
    z-index: 1;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes appearCenter {
    from { opacity: 0; transform: translateY(calc(-50% + 16px)); }
    to   { opacity: 1; transform: translateY(-50%); }
  }

  @media (max-width: 600px) {
    body { padding: 32px 28px; overflow: auto; }
    header { flex-direction: column; gap: 24px; }
    .right-nav { align-items: flex-start; }
    .nav-contact { text-align: left; }
    .center { position: static; transform: none; margin: 48px 0; animation: appear 1s 0.55s cubic-bezier(0.16,1,0.3,1) forwards; }
    footer { flex-direction: column; gap: 28px; align-items: flex-start; }
    .vline { display: none; }
  }
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="bg-glow"></div>
<div class="bg-glow-2"></div>
<div class="grain"></div>
<div class="vline"></div>

<header>
  <div class="wordmark">Super<em>ior</em></div>

  <nav class="right-nav">
    <a href="portfolio/index.html" class="nav-link">Portfolio</a>
    <div class="nav-contact">
      <a href="mailto:andreyshchepanskiy@gmail.com" class="nav-link">Get in touch</a>
      <div class="nav-email">andreyshchepanskiy@gmail.com</div>
    </div>
  </nav>
</header>

<div class="center">
  <div class="descriptor">We build</div>
  <div class="service">AI automation systems<br>for modern companies.</div>
</div>

<footer>
  <div class="location">
    Headquarters
    <strong>Tel Aviv, Israel</strong>
  </div>
</footer>

<script>
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
